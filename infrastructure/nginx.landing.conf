server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers.
    # NOTE (nginx gotcha, same as infrastructure/nginx.conf): add_header is NOT
    # inherited into a location that defines ANY add_header of its own. The
    # content locations below set Cache-Control, so they must REPEAT these
    # headers or they ship without them. Keep the copies below in sync.
    #
    # This is a public marketing page: no auth, no PHI. CSP is tight — self-only
    # scripts, inline styles allowed (the design uses a few style attributes),
    # images from self + data:. The one cross-origin allowance is connect-src to
    # https://api.mydailydignity.com, scoped exactly (no wildcard): the free
    # benefits helper POSTs /public/knowledge/ask there (unauthed, no PHI).
    # Without it the browser falls back to default-src 'self' and blocks the
    # fetch.
    #
    # JSON-LD HASH: the inline <script type="application/ld+json"> Organization
    # block in index.html IS matched against script-src by Safari/WebKit (Chrome
    # and Firefox exempt ld+json data blocks, WebKit does not), so without an
    # allowance Safari logs a "Refused to execute a script" CSP error. Rather
    # than weaken the policy with 'unsafe-inline', we pin the exact content hash
    # 'sha256-0Va886ih4Ko/T4xobPsDEIFTFveIrAQllqKx5hgWOqM=' in script-src. This
    # hash covers the ld+json element's text content EXACTLY (including its
    # leading/trailing whitespace); it must be regenerated if that block in
    # landing/index.html changes. `landing npm run build` runs
    # scripts/check-csp-hash.mjs, which recomputes the hash from the built
    # dist/index.html and fails the build if it drifts from the value here, so
    # this can't silently rot.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://api.mydailydignity.com; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'sha256-0Va886ih4Ko/T4xobPsDEIFTFveIrAQllqKx5hgWOqM='; font-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Cache static assets for 1 year (Vite fingerprints filenames).
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Repeat security headers — this location's own add_header disables inheritance.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://api.mydailydignity.com; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'sha256-0Va886ih4Ko/T4xobPsDEIFTFveIrAQllqKx5hgWOqM='; font-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;
        try_files $uri =404;
    }

    # No cache for index.html
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        # Repeat security headers — this location's own add_header disables inheritance.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://api.mydailydignity.com; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'sha256-0Va886ih4Ko/T4xobPsDEIFTFveIrAQllqKx5hgWOqM='; font-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;
    }

    # Single static page — serve files directly, real 404 on miss (no SPA
    # history fallback; unknown paths should not soft-200 as index.html, which
    # would hurt SEO). `/` resolves to index.html via the index directive.
    location / {
        try_files $uri $uri/ =404;
    }
}
