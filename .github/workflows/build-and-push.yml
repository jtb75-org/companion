name: Build and Push

# Self-hosted deploy path: on every push to main, run the CI gate, build the
# backend + web images with kaniko, push to zot, then bump the image tags in
# companion-gitops. ArgoCD reconciles from there.
#
# The legacy GCP deploy workflows (deploy-staging.yml / deploy-prod.yml) still
# exist and are unaffected until the self-hosted migration completes.

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: zot.lan.ng20.org

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build:
    name: Build, push, and bump gitops
    needs: test
    runs-on: jtb75-arc
    container:
      # Generic builder image (git + kaniko) reused across repos.
      image: zot.lan.ng20.org/atlas/builder:latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the diff base (github.event.before / HEAD^) always
          # resolves on the self-hosted runner — a shallow clone left HEAD^
          # unresolvable, tripping the empty-tree fallback so OCR always "changed".
          fetch-depth: 0

      - name: Short SHA
        id: sha
        run: |
          short=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "short=${short}" >> "$GITHUB_OUTPUT"

      - name: Detect changed paths
        id: changes
        # The OCR image is large and rarely changes, but rebuilding + pushing it
        # on every push is slow and repeatedly 502s the zot push (the whole
        # workflow then fails and blocks the gitops bump). Only build/push OCR
        # when ocr/ actually changed; otherwise keep the existing OCR tag.
        env:
          BEFORE: ${{ github.event.before }}
        run: |
          # The checkout is owned by a different UID than this container's user,
          # so git refuses to operate ("dubious ownership") and every git call
          # silently fails → base unknown → OCR always builds. Trust the workspace.
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          # Base = the commit main was at before this push. Fall back to
          # building OCR (safe) if it's unavailable (first push / force-push /
          # not fetched) rather than silently skipping.
          if [ -n "${BEFORE}" ] && [ "${BEFORE}" != "0000000000000000000000000000000000000000" ] \
             && git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            base="${BEFORE}"
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            base="HEAD^"
          else
            base=""
          fi
          echo "diff base: ${base:-<none>} → HEAD $(git rev-parse --short HEAD)"
          if [ -n "${base}" ] && git diff --quiet "${base}" HEAD -- ocr/; then
            echo "ocr=false" >> "$GITHUB_OUTPUT"
            echo "ocr/ unchanged → skipping OCR build."
          else
            echo "ocr=true" >> "$GITHUB_OUTPUT"
            echo "ocr/ changed (or base unknown) → building OCR."
          fi
          # The public marketing landing (www.mydailydignity.com) is a separate
          # static image, decoupled from the authed web app. It rarely changes,
          # so — like OCR — only build/push it when landing/ or its Dockerfile/
          # nginx changed; otherwise keep the existing companion-landing tag.
          if [ -n "${base}" ] && git diff --quiet "${base}" HEAD -- \
               landing/ infrastructure/Dockerfile.landing infrastructure/nginx.landing.conf; then
            echo "landing=false" >> "$GITHUB_OUTPUT"
            echo "landing/ unchanged → skipping landing build."
          else
            echo "landing=true" >> "$GITHUB_OUTPUT"
            echo "landing/ changed (or base unknown) → building landing."
          fi

      - name: Configure registry auth (kaniko)
        env:
          ZOT_USERNAME: ${{ secrets.ZOT_USERNAME }}
          ZOT_PASSWORD: ${{ secrets.ZOT_PASSWORD }}
        run: |
          AUTH=$(printf '%s:%s' "${ZOT_USERNAME}" "${ZOT_PASSWORD}" | base64 | tr -d '\n')
          CONFIG=$(printf '{"auths":{"%s":{"auth":"%s"}}}' "${REGISTRY}" "${AUTH}")
          mkdir -p /opt/kaniko/.docker /root/.docker "${HOME:-/root}/.docker"
          printf '%s\n' "${CONFIG}" > /opt/kaniko/.docker/config.json
          printf '%s\n' "${CONFIG}" > /root/.docker/config.json
          printf '%s\n' "${CONFIG}" > "${HOME:-/root}/.docker/config.json"

      - name: Kaniko build + push — backend
        run: |
          /opt/kaniko/executor \
            --context="${GITHUB_WORKSPACE}/backend" \
            --dockerfile="${GITHUB_WORKSPACE}/infrastructure/Dockerfile.backend" \
            --destination="${REGISTRY}/companion-backend:${{ steps.sha.outputs.short }}" \
            --destination="${REGISTRY}/companion-backend:main-latest" \
            --build-arg="BUILD_COMMIT=${{ steps.sha.outputs.short }}" \
            --push-retry=3 \
            --snapshot-mode=redo

      - name: Kaniko build + push — ocr
        # Self-hosted PaddleOCR service (replaces Document AI). Single-stage
        # Dockerfile, context is the ocr/ dir. The large model layers make the
        # push to zot flaky (502) — only build when ocr/ changed, and retry the
        # push. When skipped, the existing companion-ocr tag is kept in gitops.
        if: steps.changes.outputs.ocr == 'true'
        run: |
          /opt/kaniko/executor \
            --context="${GITHUB_WORKSPACE}/ocr" \
            --dockerfile="${GITHUB_WORKSPACE}/ocr/Dockerfile" \
            --destination="${REGISTRY}/companion-ocr:${{ steps.sha.outputs.short }}" \
            --destination="${REGISTRY}/companion-ocr:main-latest" \
            --build-arg="BUILD_COMMIT=${{ steps.sha.outputs.short }}" \
            --push-retry=5 \
            --snapshot-mode=redo

      - name: Build web bundle (outside Docker)
        # Built outside the Dockerfile so the web image stays single-stage
        # (kaniko + multi-stage = registry push-auth bug). VITE_* are baked into
        # the bundle here; API URL from a repo var, Firebase config from
        # vars/secrets. Same approach as blue/hillco2.
        working-directory: web
        env:
          COREPACK_ENABLE_STRICT: "0"
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          # Auth provider baked into the web bundle. Empty/unset ⇒ 'firebase'
          # (AuthProvider default). Cutover lever: set the repo var to 'authentik'
          # to ship the Authentik BFF cookie login; set back to 'firebase' + rebuild
          # to roll back. Backend is authentik dual-run, so the flip is client-only.
          VITE_AUTH_PROVIDER: ${{ vars.VITE_AUTH_PROVIDER }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          npm install
          npm run build
          ls -la dist/

      - name: Kaniko build + push — web
        # Single-stage Dockerfile.web copies the prebuilt web/dist; context is
        # the repo root (for web/dist + infrastructure/nginx.conf).
        run: |
          /opt/kaniko/executor \
            --context="${GITHUB_WORKSPACE}" \
            --dockerfile="${GITHUB_WORKSPACE}/infrastructure/Dockerfile.web" \
            --destination="${REGISTRY}/companion-web:${{ steps.sha.outputs.short }}" \
            --destination="${REGISTRY}/companion-web:main-latest" \
            --build-arg="BUILD_COMMIT=${{ steps.sha.outputs.short }}" \
            --push-retry=3 \
            --snapshot-mode=redo

      - name: Build landing bundle (outside Docker)
        # Static marketing bundle (landing/dist). Built outside the Dockerfile so
        # the landing image stays single-stage (kaniko + multi-stage = registry
        # push-auth bug), exactly like the web bundle above. No VITE_* / secrets —
        # the landing page is public, unauthed, and touches no PHI. Only built
        # when landing/ changed (see Detect changed paths).
        if: steps.changes.outputs.landing == 'true'
        working-directory: landing
        env:
          COREPACK_ENABLE_STRICT: "0"
        run: |
          npm install
          npm run build
          ls -la dist/

      - name: Kaniko build + push — landing
        # Single-stage Dockerfile.landing copies the prebuilt landing/dist; context
        # is the repo root (for landing/dist + infrastructure/nginx.landing.conf).
        # Only build when landing/ changed; when skipped, the existing
        # companion-landing tag is kept in gitops.
        if: steps.changes.outputs.landing == 'true'
        run: |
          /opt/kaniko/executor \
            --context="${GITHUB_WORKSPACE}" \
            --dockerfile="${GITHUB_WORKSPACE}/infrastructure/Dockerfile.landing" \
            --destination="${REGISTRY}/companion-landing:${{ steps.sha.outputs.short }}" \
            --destination="${REGISTRY}/companion-landing:main-latest" \
            --build-arg="BUILD_COMMIT=${{ steps.sha.outputs.short }}" \
            --push-retry=3 \
            --snapshot-mode=redo

      - name: Checkout companion-gitops
        uses: actions/checkout@v4
        with:
          repository: jtb75-org/companion-gitops
          token: ${{ secrets.GITOPS_DEPLOY_TOKEN }}
          path: companion-gitops
          persist-credentials: true

      - name: Update image tags in gitops
        working-directory: companion-gitops/overlays/onprem
        env:
          NEW_TAG: ${{ steps.sha.outputs.short }}
          OCR_BUILT: ${{ steps.changes.outputs.ocr }}
          LANDING_BUILT: ${{ steps.changes.outputs.landing }}
        run: |
          # Only bump companion-ocr / companion-landing when they were actually
          # rebuilt this run; otherwise their ${NEW_TAG} image doesn't exist in
          # zot. backend + web build every run.
          imgs="companion-backend companion-web"
          if [ "${OCR_BUILT}" = "true" ]; then
            imgs="${imgs} companion-ocr"
          else
            echo "OCR unchanged — leaving companion-ocr tag as-is."
          fi
          if [ "${LANDING_BUILT}" = "true" ]; then
            imgs="${imgs} companion-landing"
          else
            echo "landing unchanged — leaving companion-landing tag as-is."
          fi
          # Quote so all-digit short SHAs don't parse as YAML integers.
          for img in ${imgs}; do
            sed -i "/name: ${REGISTRY}\/${img}$/,/newTag:/ s|newTag: .*|newTag: \"${NEW_TAG}\"|" kustomization.yaml
          done
          grep -A2 "name: ${REGISTRY}/companion-" kustomization.yaml || true

      - name: Commit and push
        working-directory: companion-gitops
        run: |
          git config user.name "companion-ci"
          git config user.email "ci@ng20.org"
          if git diff --quiet; then
            echo "No image-tag change to commit."
            exit 0
          fi
          git add overlays/onprem/kustomization.yaml
          git commit -m "ci: bump companion images to ${{ steps.sha.outputs.short }}"
          git push origin HEAD:main
