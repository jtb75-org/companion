server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers.
    # NOTE (nginx gotcha): add_header is NOT inherited into a location that defines ANY
    # add_header of its own. The two content locations below (static assets + index.html)
    # set Cache-Control, so they must REPEAT these security headers or they ship without
    # them (which is exactly what happened — the edge saw no security headers on real
    # responses). Keep the two copies below in sync with this block.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "frame-ancestors 'self'" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Cache static assets for 1 year
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Repeat security headers — this location's own add_header disables inheritance.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "frame-ancestors 'self'" always;
        try_files $uri =404;
    }

    # No cache for index.html
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        # Repeat security headers — this location's own add_header disables inheritance.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "frame-ancestors 'self'" always;
    }

    # Mobile deep-link association files (iOS Universal Links / Android App Links).
    # Serve the static files directly and keep them OUT of the SPA history-fallback
    # (404 on miss, never index.html). The Apple AASA file has NO extension, so nginx
    # would serve it as application/octet-stream — Apple requires JSON, so force the
    # type. assetlinks.json already resolves to application/json via mime.types.
    location = /.well-known/apple-app-site-association {
        default_type application/json;
        try_files $uri =404;
    }
    location /.well-known/ {
        try_files $uri =404;
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
