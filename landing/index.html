<!doctype html>
<html lang="en">

    <meta charset="UTF-8" />

    <meta name="theme-color" content="#23625C" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#101F1C" media="(prefers-color-scheme: dark)" />

    <title>My Daily Dignity — A companion for living life on your own terms</title>
    <meta
      name="description"
      content="My Daily Dignity is a companion for independent living — at any age or ability. It makes sense of the mail, keeps medications and appointments on track, and shares the load with the people who help. Includes a free helper for Social Security & disability benefits."
    />
    <link rel="canonical" href="https://www.mydailydignity.com/" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="My Daily Dignity" />
    <meta property="og:title" content="A companion for living life on your own terms" />
    <meta
      property="og:description"
      content="A companion for independent living, at any age or ability — makes sense of the mail, keeps medications and appointments on track, and shares the load. Plus a free Social Security & disability benefits helper."
    />
    <meta property="og:url" content="https://www.mydailydignity.com/" />
    <meta property="og:image" content="https://www.mydailydignity.com/og-image.svg" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="A companion for living life on your own terms" />
    <meta
      name="twitter:description"
      content="A companion for independent living, at any age or ability. Includes a free Social Security & disability benefits helper."
    />
    <meta name="twitter:image" content="https://www.mydailydignity.com/og-image.svg" />

      not-legal-advice framing lives in the visible footer/disclaimers; this is

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "My Daily Dignity",
        "url": "https://www.mydailydignity.com/",
        "description": "A companion for independent living, at any age or ability — making sense of the mail, keeping medications and appointments on track, and sharing the load with the people who help. Includes a free helper for understanding Social Security disability benefits. Not affiliated with the Social Security Administration."
      }
