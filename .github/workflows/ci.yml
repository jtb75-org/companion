name: CI

on:
  # Every commit that matters is gated exactly ONCE:
  #   * PRs           -> pull_request (below)
  #   * main          -> build-and-push.yml calls this via workflow_call BEFORE building
  #   * anything else -> workflow_dispatch, on demand
  #
  # There is deliberately NO `push` trigger. It used to be `push: branches-ignore: [main]`,
  # which double-ran the entire suite on every PR branch: a push to a branch with an open
  # PR matches BOTH triggers, so each commit burned two identical runs (measured: the last
  # 40 runs were an exact 20 push / 20 pull_request split). Re-adding a push trigger
  # restores that waste — the pull_request event already covers the same commits.
  # The only thing lost is CI on a branch with no PR open yet; use workflow_dispatch.
  pull_request:
    branches: [main]
  workflow_call:
  workflow_dispatch:

# One in-flight run per ref. A force-push or a rapid follow-up commit supersedes the
# previous run, which nobody will read — cancel it instead of paying for it.
# NEVER cancel main: that ref reaches this workflow via build-and-push.yml's
# workflow_call, and killing it mid-flight would abort a build/deploy.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install ruff
        run: pip install ruff
      - name: Lint backend
        working-directory: backend
        run: ruff check .

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: companion_test
          POSTGRES_USER: companion
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Reset test database
        env:
          PGPASSWORD: test
        run: |
          psql -h localhost -U companion -d postgres -c "DROP DATABASE IF EXISTS companion_test;"
          psql -h localhost -U companion -d postgres -c "CREATE DATABASE companion_test;"
      - name: Run migrations
        working-directory: backend
        env:
          COMPANION_DATABASE_URL: postgresql+asyncpg://companion:test@localhost:5432/companion_test
          COMPANION_REDIS_URL: redis://localhost:6379/0
        run: alembic upgrade head
      - name: Run tests
        working-directory: backend
        env:
          COMPANION_DATABASE_URL: postgresql+asyncpg://companion:test@localhost:5432/companion_test
          COMPANION_REDIS_URL: redis://localhost:6379/0
          COMPANION_ENVIRONMENT: test
          COMPANION_DEV_AUTH_BYPASS: "true"
        run: pytest -v

  lint-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check if web exists
        id: check
        run: test -f web/package.json && echo "exists=true" >> "$GITHUB_OUTPUT" || echo "exists=false" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v6
        if: steps.check.outputs.exists == 'true'
        with:
          node-version: "20"
      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        working-directory: web
        run: npm ci
      - name: Lint
        if: steps.check.outputs.exists == 'true'
        working-directory: web
        run: npm run lint

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.0"
      - name: Terraform fmt check
        working-directory: infrastructure/terraform
        run: terraform fmt -check -recursive
      - name: Terraform validate
        working-directory: infrastructure/terraform
        run: |
          terraform init -backend=false
          terraform validate
